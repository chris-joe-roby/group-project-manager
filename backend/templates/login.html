<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Teamly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b1220 0%, #111827 45%, #1f2937 100%);
            min-height: 100vh;
        }
        .glass-ui .bg-white {
            background: rgba(15, 23, 42, 0.62) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.22) !important;
        }
        .glass-ui .text-gray-900 { color: #f8fafc !important; }
        .glass-ui .text-gray-700 { color: #cbd5e1 !important; }
        .glass-ui .text-gray-600, .glass-ui .text-gray-500 { color: #94a3b8 !important; }
        .glass-ui .border-gray-300 { border-color: #334155 !important; }
        .glass-ui input {
            background-color: rgba(15, 23, 42, 0.58) !important;
            color: #e2e8f0 !important;
            border-color: #334155 !important;
        }
        .glass-ui input::placeholder { color: #64748b !important; }
        .glass-ui .bg-white {
            transform-style: preserve-3d;
            transition: transform 0.28s ease, box-shadow 0.28s ease;
        }
        .glass-ui .bg-white:hover {
            transform: translateY(-6px) rotateX(1.8deg) rotateY(-1.8deg);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="glass-ui flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-8">
                <div class="flex items-center justify-center mb-3">
                    <i class="fas fa-graduation-cap text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-center text-white">Teamly</h1>
                <p class="text-center text-indigo-100 mt-2">Smart Team Formation & Management</p>
            </div>

            <!-- Form Content -->
            <div class="px-6 py-8">
                {% if error %}
                <div class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                    <div class="flex items-center">
                        <i class="fas fa-exclamation-circle text-red-500 mr-3"></i>
                        <p class="text-sm text-red-700">{{ error }}</p>
                    </div>
                </div>
                {% endif %}

                <h2 class="text-2xl font-bold text-gray-900 mb-6">Sign In</h2>

                <form method="POST" class="space-y-4">
                    <!-- Email Input -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            name="email" 
                            required
                            placeholder="your@email.com"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        >
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input 
                            type="password" 
                            name="password" 
                            required
                            placeholder="••••••••"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        >
                    </div>

                    <!-- Login Button -->
                    <button 
                        type="submit"
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3 rounded-lg hover:from-indigo-700 hover:to-purple-700 transition duration-300 transform hover:-translate-y-0.5 shadow-lg mt-6"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">or</span>
                    </div>
                </div>

                <!-- Demo Credentials -->
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                    <p class="text-sm font-semibold text-blue-900 mb-2"><i class="fas fa-lightbulb mr-2"></i>Demo Accounts:</p>
                    <div class="space-y-1 text-xs text-blue-800">
                        <p><strong>Student:</strong> student1@mgits.ac.in / pass123</p>
                        <p><strong>Faculty:</strong> faculty1@mgits.ac.in / pass123</p>
                    </div>
                </div>

                <!-- Register Link -->
                <p class="text-center text-gray-600 text-sm">
                    Don't have an account?
                    <a href="/register" class="text-indigo-600 font-semibold hover:text-indigo-700 transition">
                        Create one
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white text-xs mt-6 opacity-75">
            © 2026 Teamly. Secure team formation system.
        </p>
    </div>
</body>
</html>
