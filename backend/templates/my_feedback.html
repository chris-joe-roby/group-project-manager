<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teamly · My Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0b1220 0%, #111827 45%, #1f2937 100%);
            min-height: 100vh;
        }
        .glass-ui .bg-white {
            background: rgba(15, 23, 42, 0.62) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
        .glass-ui .bg-gray-50 { background-color: #0f172a !important; }
        .glass-ui .text-gray-900 { color: #f8fafc !important; }
        .glass-ui .text-gray-700 { color: #cbd5e1 !important; }
        .glass-ui .text-gray-600, .glass-ui .text-gray-500 { color: #94a3b8 !important; }
        .glass-ui .bg-white {
            transform-style: preserve-3d;
            transition: transform 0.28s ease, box-shadow 0.28s ease;
        }
        .glass-ui .bg-white:hover {
            transform: translateY(-5px) rotateX(1.4deg) rotateY(-1.4deg);
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.48);
        }
    </style>
</head>
<body class="bg-gray-50 glass-ui">
    <nav class="bg-white shadow">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <a href="/student/dashboard" class="text-indigo-600 hover:text-indigo-700">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">
            <i class="fas fa-comments mr-3 text-indigo-600"></i>My Feedback
        </h1>

        {% if comments %}
        <div class="space-y-4">
            {% for comment in comments %}
            <div class="bg-white rounded-lg shadow-md overflow-hidden border-l-4 border-indigo-600 hover:shadow-lg transition">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="font-semibold text-gray-900">{{ comment.faculty_name }}</p>
                            <p class="text-sm text-gray-600">{{ comment.timestamp[:10] }}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-semibold
                            {% if comment.type == 'general' %}
                                bg-blue-100 text-blue-800
                            {% elif comment.type == 'grade' %}
                                bg-green-100 text-green-800
                            {% else %}
                                bg-yellow-100 text-yellow-800
                            {% endif %}">
                            {{ comment.type|upper }}
                        </span>
                    </div>
                    <p class="text-gray-700">{{ comment.comment }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="bg-white rounded-lg shadow p-8 text-center">
            <i class="fas fa-inbox text-gray-400 text-5xl mb-4"></i>
            <p class="text-gray-600 mb-2">No feedback yet</p>
            <p class="text-sm text-gray-500">Your faculty members will share feedback here</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
