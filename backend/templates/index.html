<!DOCTYPE html>
<html>
<head>
    <title>Teamly</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0b1220 0%, #111827 45%, #1f2937 100%);
    color: #e2e8f0;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    background: #2f80ed;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover { background: #1366d6; }

.groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin: 40px;
}

.group-card {
    background: rgba(15, 23, 42, 0.62);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(148, 163, 184, 0.22);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.42);
    transform-style: preserve-3d;
    transition: transform 0.28s ease, box-shadow 0.28s ease;
}

.group-card:hover {
    transform: translateY(-6px) rotateX(1.8deg) rotateY(-1.8deg);
    box-shadow: 0 22px 48px rgba(0, 0, 0, 0.5);
}

.group-card h3 { color: #a5b4fc; }
.group-card ul { list-style: none; padding: 0; }
.group-card li { padding: 6px 0; border-bottom: 1px solid #334155; }
</style>
</head>

<body>

<h1>Teamly</h1>

<button onclick="generateGroups()">Generate Groups</button>
<h3 id="result"></h3>

<div id="groups-container" class="groups-grid"></div>

<script>
async function generateGroups() {

    const response = await fetch("/api/generate-groups", { method: "POST" });
    const data = await response.json();

    document.getElementById("result").innerText = data.message;

    const container = document.getElementById("groups-container");
    container.innerHTML = "";

    data.groups.forEach((group, index) => {
        let card = `<div class="group-card">
                        <h3>Group ${index + 1}</h3>
                        <ul>`;

        group.forEach(member => {
            card += `<li>${member}</li>`;
        });

        card += `</ul></div>`;
        container.innerHTML += card;
    });
}
</script>

</body>
</html>
